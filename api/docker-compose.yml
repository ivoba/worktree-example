name: ${COMPOSE_PROJECT_NAME:-worktree-api}

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-worktree-api}-php
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    networks:
      - worktree-network
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/9000"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME:-worktree-api}-nginx
    ports:
      - "${API_PORT:-8080}:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_healthy
    networks:
      - worktree-network
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: ${COMPOSE_PROJECT_NAME:-worktree-api}-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8026}:8025"
    networks:
      - worktree-network

networks:
  worktree-network:
    driver: bridge
